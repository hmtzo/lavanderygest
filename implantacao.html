<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#533C9D" />
<title>Implantação · Lavandery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="design.css"/>
<style>
  body { background: var(--bg); }
  .m-header { background:#fff; padding: 18px 20px; border-bottom:1px solid var(--ink-200); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10 }
  .m-container { padding: 20px 16px 100px; max-width: 560px; margin: 0 auto; }
  .stage {
    background:#fff; border:1px solid var(--ink-200); border-radius: var(--r-lg);
    margin-bottom: 12px; overflow: hidden;
    transition: box-shadow var(--t-base);
  }
  .stage.done { border-color: var(--success); background: #F0FDF4; }
  .stage summary {
    padding: 16px; cursor: pointer; display:flex; align-items:center; gap: 12px;
    list-style: none; -webkit-tap-highlight-color: transparent;
  }
  .stage summary::-webkit-details-marker { display:none; }
  .stage-check {
    width: 28px; height: 28px; border-radius: 999px; border: 2px solid var(--ink-300);
    display: grid; place-items: center; flex-shrink: 0;
    transition: all var(--t-fast);
  }
  .stage.done .stage-check { background: var(--success); border-color: var(--success); color:#fff; }
  .stage-info { flex: 1; min-width: 0; }
  .stage-title { font-weight: 600; color: var(--ink-900); font-size: 15px; }
  .stage.done .stage-title { color: var(--ink-500); text-decoration: line-through; }
  .stage-sub { font-size: 12px; color: var(--ink-500); margin-top: 2px; }
  .stage-prog { width: 52px; height: 6px; background: var(--ink-100); border-radius: 3px; overflow:hidden; }
  .stage-prog > div { height: 100%; background: var(--brand-600); transition: width var(--t-base); }
  .stage-body { padding: 0 16px 16px 52px; border-top:1px solid var(--ink-100); display:none; }
  .stage[open] .stage-body { display: block; }
  .item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--ink-100);
    -webkit-tap-highlight-color: transparent;
  }
  .item:last-child { border-bottom: none; }
  .item-check {
    width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--ink-300);
    display: grid; place-items: center; flex-shrink: 0; margin-top: 2px;
    cursor: pointer;
    transition: all var(--t-fast);
  }
  .item-check.done { background: var(--brand-700); border-color: var(--brand-700); color: #fff; }
  .item-text { flex: 1; font-size: 14px; color: var(--ink-800); }
  .item-text.done { color: var(--ink-400); text-decoration: line-through; }
  .item-meta { font-size: 10px; color: var(--success); margin-top: 2px; }
  .item-note { width: 100%; margin-top: 8px; min-height: 34px; font-size: 12px; padding: 6px 10px; border: 1px solid var(--ink-200); border-radius: 8px; font-family: inherit; background: #fff; }
  .progress-header {
    background: linear-gradient(135deg, #533C9D, #7D5FC7);
    color: #fff; border-radius: var(--r-xl);
    padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-md);
  }
  .progress-bar { height: 10px; background: rgba(255,255,255,.2); border-radius: 5px; overflow:hidden; margin-top: 10px; }
  .progress-bar > div { height: 100%; background: #fff; transition: width 600ms var(--ease-out); }
  .upload-btn { display:flex; align-items:center; gap:6px; font-size: 12px; color: var(--brand-700); cursor: pointer; margin-top: 4px; }
  .upload-btn input { display: none; }
</style>
</head>
<body>
<header class="m-header">
  <div style="display:flex;align-items:center;gap:10px">
    <img src="/logo.svg" alt="Lavandery" style="height:24px"/>
    <span style="font-size:13px;color:var(--ink-500);margin-left:8px">Implantação</span>
  </div>
  <button onclick="location.reload()" class="btn-new ghost sm">↻</button>
</header>
<main class="m-container" id="container">
  <div style="text-align:center;padding:40px;color:var(--ink-400)">Carregando...</div>
</main>

<script>
const id = new URLSearchParams(location.search).get('id');
if (!id) { document.getElementById('container').innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger)">Link inválido. Falta o parâmetro <code>id</code>.</div>'; }

async function load() {
  if (!id) return;
  const r = await fetch('/api/implantations/'+id);
  if (!r.ok) { document.getElementById('container').innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger)">Implantação não encontrada</div>'; return; }
  const impl = await r.json();
  render(impl);
}

function esc(s) { return (s||'').toString().replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function render(impl) {
  const totalSteps = impl.steps?.length || 0;
  const doneSteps = (impl.steps||[]).filter(s => s.completed).length;
  const pct = totalSteps ? Math.round(doneSteps/totalSteps * 100) : 0;
  const sla = impl.days_to_deadline;
  const slaTxt = sla == null ? '—' : sla < 0 ? `${Math.abs(sla)} dias em atraso` : sla === 0 ? 'vence hoje' : `em ${sla} dias`;

  let html = `
    <div class="progress-header">
      <div style="font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.05em">Implantação</div>
      <div style="font-size:20px;font-weight:600;margin-top:4px">${esc(impl.condo_name||'—')}</div>
      <div style="font-size:12px;opacity:.9;margin-top:4px">${esc(impl.condo_address||'')} · ${esc(impl.condo_city||'')}</div>
      <div class="progress-bar"><div style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px">
        <span>${doneSteps}/${totalSteps} etapas · ${pct}%</span>
        <span><b>SLA: ${slaTxt}</b></span>
      </div>
    </div>`;

  (impl.steps||[]).forEach(step => {
    const total = step.items?.length || 0;
    const done = (step.items||[]).filter(i => i.done).length;
    const spct = total ? Math.round(done/total*100) : (step.completed?100:0);
    const openByDefault = !step.completed && (done > 0 || (step.status === 'em_andamento'));
    html += `
    <details class="stage ${step.completed?'done':''}" data-sid="${step.id}" ${openByDefault ? 'open' : ''}>
      <summary>
        <div class="stage-check">${step.completed ? '✓' : ''}</div>
        <div class="stage-info">
          <div class="stage-title">${step.step_number}. ${esc(step.title)}</div>
          ${step.description ? `<div class="stage-sub">${esc(step.description)}</div>` : ''}
          ${total ? `<div class="stage-sub">${done}/${total} itens</div>` : ''}
        </div>
        ${total ? `<div class="stage-prog"><div style="width:${spct}%"></div></div>` : ''}
      </summary>
      <div class="stage-body">
        ${(step.items||[]).map(it => `
          <div class="item" data-iid="${it.id}">
            <div class="item-check ${it.done?'done':''}">${it.done ? '✓' : ''}</div>
            <div style="flex:1;min-width:0">
              <div class="item-text ${it.done?'done':''}">${esc(it.title)}</div>
              ${it.completed_at ? `<div class="item-meta">✓ ${new Date(it.completed_at).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}</div>` : ''}
              ${it.note ? `<div style="font-size:11px;color:var(--ink-500);margin-top:4px">${esc(it.note)}</div>` : ''}
            </div>
          </div>`).join('')}
        ${total === 0 ? '<div style="padding:10px 0;color:var(--ink-400);font-size:13px">Marque esta etapa como concluída quando terminar.</div>' : ''}
        <label class="upload-btn">
          📷 Anexar foto
          <input type="file" accept="image/*" capture="environment" onchange="uploadPhoto(event,'${step.id}')"/>
        </label>
      </div>
    </details>`;
  });

  document.getElementById('container').innerHTML = html;

  // Handlers
  document.querySelectorAll('.item').forEach(el => el.addEventListener('click', async (e) => {
    if (e.target.closest('.item-text') || e.target.closest('.item-check')) {
      const iid = el.dataset.iid;
      const checked = !el.querySelector('.item-check').classList.contains('done');
      await fetch('/api/implantation-checklist-items/'+iid, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ done: checked ? 1 : 0 }) });
      load();
    }
  }));
  document.querySelectorAll('.stage').forEach(st => {
    st.querySelector('.stage-check').addEventListener('click', async (e) => {
      e.preventDefault(); e.stopPropagation();
      const sid = st.dataset.sid;
      const done = !st.classList.contains('done');
      await fetch('/api/implantation-steps/'+sid, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ completed: done ? 1 : 0 }) });
      load();
    });
  });
}

async function uploadPhoto(e, stepId) {
  const file = e.target.files?.[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file); fd.append('step_id', stepId);
  const r = await fetch('/api/implantations/'+id+'/files', { method:'POST', body: fd });
  const d = await r.json();
  if (r.ok) alert('✓ Foto enviada'); else alert('Erro: '+(d.error||d.detail));
  load();
}

load();
</script>
<script src="/bubbles.js" defer></script>
</body>
</html>
